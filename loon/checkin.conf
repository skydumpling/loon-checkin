[MITM]
hostname = %APPEND% i.pcbeta.com, www.cncalc.org, uiwow.com, www.uiwow.com

[Script]
# 获取 Cookie：成功后建议在 Loon 脚本订阅详情里禁用这 3 条。
http-request ^https:\/\/i\.pcbeta\.com\/home\.php\?mod=task tag=PCBeta获取Cookie, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/pcbeta.js, requires-body=false, timeout=20, enable=true
http-request ^https:\/\/www\.cncalc\.org\/($|forum\.php|index\.php|member\.php|dsu_paulsign-sign\.html|plugin\.php\?id=dsu_paulsign:sign) tag=cnCalc获取Cookie, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/cncalc.js, requires-body=false, timeout=20, enable=true
http-request ^https:\/\/(www\.)?uiwow\.com\/($|forum\.php|index\.php|member\.php|plugin\.php\?id=dc_signin:dc_signin) tag=UIWOW获取Cookie, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/uiwow.js, requires-body=false, timeout=20, enable=true
http-request ^https:\/\/(www\.)?uiwow\.com\/plugin\.php\?id=dc_signin:sign tag=UIWOW抓签到请求, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/uiwow-capture.js, requires-body=true, timeout=20, enable=false

# 每天 09:00 签到。
cron "0 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/pcbeta.js, timeout=60, tag=PCBeta签到, enable=true
cron "0 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/cncalc.js, timeout=60, tag=cnCalc签到, argument="mood=kx&saying=%E7%AD%BE%E5%88%B0", enable=true
cron "0 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/uiwow.js, timeout=60, tag=UIWOW签到, argument="mood=kx&saying=%E7%AD%BE%E5%88%B0", enable=true
