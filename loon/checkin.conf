[MITM]
hostname = %APPEND% i.pcbeta.com, www.cncalc.org, uiwow.com, www.uiwow.com, www.mjtd.com, www.iopq.net, www.javbus.com

[Script]
# 获取 Cookie：默认关闭。需要重新获取时临时启用，脚本静默保存，不发送成功通知。
http-request ^https:\/\/(i\.pcbeta\.com\/home\.php\?mod=task|www\.cncalc\.org\/($|forum\.php|index\.php|member\.php|dsu_paulsign-sign\.html|plugin\.php\?id=dsu_paulsign:sign)|(www\.)?uiwow\.com\/plugin\.php\?id=dc_signin:(dc_signin|sign)) tag=签到Cookie获取, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/cookie.js?v=202606190800, requires-body=false, timeout=20, enable=false
http-request ^https:\/\/(www\.)?uiwow\.com\/.*dc_signin tag=UIWOW抓签到请求, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/uiwow-capture.js?v=202606171002, requires-body=true, timeout=20, enable=false
http-request ^https:\/\/(www\.)?mjtd\.com\/ tag=MJTD获取Cookie, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/visit.js?v=202606190910, argument="site=mjtd&account=mjtd", requires-body=false, timeout=20, enable=false
http-request ^https:\/\/(www\.)?iopq\.net\/forum\.php\?gid=112 tag=IOPQ获取Cookie, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/visit.js?v=202606190910, argument="site=iopq&account=iopq", requires-body=false, timeout=20, enable=false
http-request ^https:\/\/(www\.)?javbus\.com\/forum\/ tag=JavBus账号1获取Cookie, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/visit.js?v=202606190910, argument="site=javbus&slot=1&account=javbus1", requires-body=false, timeout=20, enable=false
http-request ^https:\/\/(www\.)?javbus\.com\/forum\/ tag=JavBus账号2获取Cookie, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/visit.js?v=202606190910, argument="site=javbus&slot=2&account=javbus2", requires-body=false, timeout=20, enable=false
http-request ^https:\/\/(www\.)?javbus\.com\/forum\/ tag=JavBus账号3获取Cookie, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/visit.js?v=202606190910, argument="site=javbus&slot=3&account=javbus3", requires-body=false, timeout=20, enable=false

# 每天 09:00 附近运行；delay=0-600 表示触发后随机延迟 0-10 分钟再请求。
cron "0 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/pcbeta.js?v=202606190910, timeout=900, tag=PCBeta签到, argument="delay=0-600", enable=true
cron "0 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/cncalc.js?v=202606190910, timeout=900, tag=cnCalc签到, argument="mood=kx&saying=%E7%AD%BE%E5%88%B0&delay=0-600", enable=true
cron "0 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/uiwow-sign.js?v=202606190910, timeout=900, tag=UIWOW签到, argument="mood=1&saying=%E7%AD%BE%E5%88%B0&delay=0-600", enable=true
cron "10 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/visit.js?v=202606190910, timeout=900, tag=MJTD访问领奖, argument="site=mjtd&account=mjtd&delay=0-600", enable=true
cron "11 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/visit.js?v=202606190910, timeout=900, tag=IOPQ访问领奖, argument="site=iopq&account=iopq&delay=0-600", enable=true
cron "12 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/visit.js?v=202606190910, timeout=900, tag=JavBus账号1访问领奖, argument="site=javbus&slot=1&account=javbus1&delay=0-600", enable=true
cron "13 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/visit.js?v=202606190910, timeout=900, tag=JavBus账号2访问领奖, argument="site=javbus&slot=2&account=javbus2&delay=0-600", enable=true
cron "14 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/visit.js?v=202606190910, timeout=900, tag=JavBus账号3访问领奖, argument="site=javbus&slot=3&account=javbus3&delay=0-600", enable=true
