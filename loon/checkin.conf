[MITM]
hostname = %APPEND% i.pcbeta.com, www.cncalc.org, uiwow.com, www.uiwow.com

[Script]
# 获取 Cookie：静默保存，不发送成功通知；三个站点都获取后建议禁用。
http-request ^https:\/\/(i\.pcbeta\.com\/home\.php\?mod=task|www\.cncalc\.org\/($|forum\.php|index\.php|member\.php|dsu_paulsign-sign\.html|plugin\.php\?id=dsu_paulsign:sign)|(www\.)?uiwow\.com\/plugin\.php\?id=dc_signin:(dc_signin|sign)) tag=签到Cookie获取, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/cookie.js?v=202606171040, requires-body=false, timeout=20, enable=true
http-request ^https:\/\/(www\.)?uiwow\.com\/.*dc_signin tag=UIWOW抓签到请求, script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/uiwow-capture.js?v=202606171002, requires-body=true, timeout=20, enable=false

# 每天 09:00 签到。
cron "0 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/pcbeta.js?v=202606180645, timeout=60, tag=PCBeta签到, enable=true
cron "0 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/cncalc.js?v=202606180645, timeout=60, tag=cnCalc签到, argument="mood=kx&saying=%E7%AD%BE%E5%88%B0", enable=true
cron "0 9 * * *" script-path=https://raw.githubusercontent.com/skydumpling/loon-checkin/main/Tasks/uiwow.js?v=202606190710, timeout=60, tag=UIWOW签到, argument="mood=1&saying=%E7%AD%BE%E5%88%B0", enable=true
